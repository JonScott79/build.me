<!doctype html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- ======================================================
         SEO
    ======================================================= -->

    <title>
        LANZAR Journal | Future Information Terminal
    </title>

    <meta
        name="description"
        content="The LANZAR Future Information Terminal. Explore our latest transmissions, ideas, and stories."
    >

    <meta
        name="theme-color"
        content="#F46B45"
    >

    <!-- ======================================================
         FONTS
    ======================================================= -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet"
    >

    <!-- ======================================================
         CSS
    ======================================================= -->

    <link
        rel="stylesheet"
        href="css/theme.css"
    >

    <link
        rel="stylesheet"
        href="css/main.css"
    >

    <link
        rel="stylesheet"
        href="css/blog.css"
    >

</head>


<body>
<!-- ======================================================
     TERMINAL HEADER
======================================================= -->

<header class="terminal-header">

    <a href="index.html" class="terminal-logo">

        <img
            src="assets/logos/logo.svg"
            alt="LANZAR"
        >

    </a>


	<div class="terminal-tagline">

		<span>
			JON'S BLURBS
		</span>

		<small>
			NOTES FROM MISSION CONTROL
		</small>

	</div>


    <a
        href="index.html"
        class="terminal-return"
    >
        RETURN TO LAUNCH PAD
    </a>

</header>

<!-- ======================================================
     BACKGROUND
======================================================= -->

<div class="background">

    <img
        src="assets/svg/background.svg"
        alt=""
    >

</div>



<main class="future-terminal">


<!-- ======================================================
     TERMINAL SCENE
======================================================= -->

<section class="terminal-scene">


    <!-- ==================================================
         BILLBOARD TERMINAL
    =================================================== -->


    <div class="journal-billboard">


        <img
            src="assets/images/billboard.png"
            alt="LANZAR Future Information Terminal"
        >


        <div class="terminal-screen">

            <iframe
                id="blog-display"
                src="blog/philosophy.html"
                title="LANZAR Journal Transmission"
            ></iframe>

        </div>


    </div>



    <!-- ==================================================
         CONTROLS
    =================================================== -->

    <div class="terminal-controls">


        <button
            id="previous"
            type="button"
        >
            ◀ PREV
        </button>


        <button
            id="home"
            type="button"
        >
            HOME
        </button>


        <button
            id="next"
            type="button"
        >
            NEXT ▶
        </button>


    </div>


</section>


</main>



<script src="js/blog.js"></script>


</body>

</html>
