<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>LANZAR | Build Tomorrow. Starting Today.</title>

    <meta name="description" content="Launch your career with AI-powered resume building, coaching, and professional development.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="css/theme.css">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/components.css">
	<link rel="stylesheet" href="css/animation.css">

</head>

<body>

<div class="background">
    <img src="assets/svg/background.svg" alt="">
</div>

<main id="app">
	<section class="hero">

		<div class="hero-left">

			<div class="logo">
				<img src="assets/logos/logo.svg" alt="Build.me">
			</div>

			<div class="hero-content">

				<h1>Build Tomorrow.</h1>

				<h2>Starting Today.</h2>

				<p>
					Your career grows.
					Your life changes.
					Your resume should keep up.
				</p>

				<div class="hero-buttons">

					<button id="launch-mission" class="btn-primary">
						Launch Mission
					</button>

					<button class="btn-secondary">Learn More</button>

				</div>

			</div>

		</div>

		<div class="hero-right">

			<div class="hero-right">

				<div class="launchpad">

					<div id="smoke" class="smoke">

						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1400">

							<g fill="#C8C8C8" fill-opacity=".88">

								<circle class="puff p1" cx="190" cy="70" r="18"/>
								<circle class="puff p2" cx="215" cy="82" r="20"/>
								<circle class="puff p3" cx="240" cy="96" r="18"/>

								<circle class="puff p4" cx="175" cy="145" r="28"/>
								<circle class="puff p5" cx="215" cy="160" r="32"/>
								<circle class="puff p6" cx="260" cy="178" r="28"/>

								<circle class="puff p7" cx="150" cy="245" r="42"/>
								<circle class="puff p8" cx="210" cy="265" r="48"/>
								<circle class="puff p9" cx="285" cy="290" r="44"/>

								<circle class="puff p10" cx="125" cy="365" r="56"/>
								<circle class="puff p11" cx="205" cy="390" r="64"/>
								<circle class="puff p12" cx="305" cy="425" r="58"/>

								<circle class="puff p13" cx="110" cy="520" r="72"/>
								<circle class="puff p14" cx="210" cy="555" r="82"/>
								<circle class="puff p15" cx="335" cy="600" r="76"/>

								<circle class="puff p16" cx="115" cy="720" r="90"/>
								<circle class="puff p17" cx="240" cy="760" r="102"/>
								<circle class="puff p18" cx="395" cy="815" r="95"/>

								<circle class="puff p19" cx="145" cy="965" r="110"/>
								<circle class="puff p20" cx="305" cy="1020" r="122"/>
								<circle class="puff p21" cx="495" cy="1085" r="112"/>

								<circle class="puff p22" cx="185" cy="1230" r="118"/>
								<circle class="puff p23" cx="395" cy="1295" r="130"/>
								<circle class="puff p24" cx="615" cy="1365" r="120"/>

							</g>

						</svg>

					</div>

					<div id="mission-control" class="mission-control">

						<h2>MISSION CONTROL</h2>

						<p>
							Sign in to begin your LANZAR journey.
						</p>

						<button id="google-login" class="auth-btn google">
							Continue with Google
						</button>

						<button id="email-login" class="auth-btn email">
							Continue with Email
						</button>

						<div id="new-user" class="new-user">

							<p class="new-user-text">
								New here?
							</p>

							<button id="create-account" class="btn-primary">
								Create New Account
							</button>

						</div>

						<div class="privacy-box">

							<strong>🔒 We take your privacy seriously.</strong>

							<p>
								We'll never post anything without your permission.
							</p>

						</div>

					</div>

				<img
					class="rocket"
					src="assets/logos/rocket.svg"
					alt="LANZAR Rocket">

				</div> <!-- .launchpad -->

			</div> <!-- .hero-right -->

		</section>

	</main>

	<script type="module" src="js/app.js"></script>

	</body>

</html>
